<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
</head>
 
<body>
    <script>
        (function () {
            var a_idx = 0;
            window.onclick = function (event) {
                var a = new Array("❤富强❤", "❤民主❤", "❤文明❤", "❤和谐❤", "❤自由❤", "❤平等❤", "❤公正❤", "❤法治❤", "❤爱国❤",
                    "❤敬业❤", "❤诚信❤", "❤友善❤");
 
                var heart = document.createElement("b"); //创建b元素
                heart.onselectstart = new Function('event.returnValue=false'); //防止拖动
 
                document.body.appendChild(heart).innerHTML = a[a_idx]; //将b元素添加到页面上
                a_idx = (a_idx + 1) % a.length;
                heart.style.cssText = "position: fixed;left:-100%;"; //给p元素设置样式
 
                var f = 16, // 字体大小
                    x = event.clientX - f / 2, // 横坐标
                    y = event.clientY - f, // 纵坐标
                    c = randomColor(), // 随机颜色
                    a = 1, // 透明度
                    s = 1.2; // 放大缩小
 
                var timer = setInterval(function () { //添加定时器
                    if (a <= 0) {
                        document.body.removeChild(heart);
                        clearInterval(timer);
                    } else {
                        heart.style.cssText = "font-size:16px;cursor: default;position: fixed;color:" +
                            c + ";left:" + x + "px;top:" + y + "px;opacity:" + a + ";transform:scale(" +
                            s + ");";
 
                        y--;
                        a -= 0.016;
                        s += 0.002;
                    }
                }, 15)
 
            }
            // 随机颜色
            function randomColor() {
 
                return "rgb(" + (~~(Math.random() * 255)) + "," + (~~(Math.random() * 255)) + "," + (~~(Math
                .random() * 255)) + ")";
 
            }
        }());
    </script>
</body>
 
</html>

<script>

    var array = [
        '可视化UI',
        '`让新手也可以使用`'
    ]

    let con = document.getElementsByClassName('text')[0]

    async function Init() {
        for (let i = 0; i < array.length; i++) {
            const item = array[i];
            await start(item)
            await back(item)
        }
    }

    function start(item) {
        return new Promise((resolve, reject) => {
            var index = 0;
            var start_timer = setInterval(function () {
                con.append(item.charAt(index));
                if (index++ === item.length) {
                    clearInterval(start_timer)
                    resolve();
                }
            }, 100);
        })
    }

    function back(item) {
        return new Promise((resolve, reject) => {
            var del_timer = setInterval(function () {
                item = item.slice(0, -1);
                con.innerHTML = item;
                if (con.innerHTML.toString().length == 0) {
                    clearInterval(del_timer)
                    resolve();
                }
            }, 50);
        })
    }

    Init()
</script>
